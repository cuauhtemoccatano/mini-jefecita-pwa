<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Jefecita</title>
    <link rel="stylesheet" href="style.css?v=3.2.2">
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/lucide@latest"></script>
    <meta name="theme-color" content="#00C4B4">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <style>
        :root {
            --primary: #00C4B4;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --caption: #888888;
        }

        /* AWAKENING CEREMONY STYLES */
        .void-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: background 1s ease-out; color: white; text-align: center;
        }
        .spectral-container { position: relative; width: 200px; height: 200px; margin-bottom: 40px; }
        #spectral-core {
            width: 80px; height: 80px; background: var(--primary);
            border-radius: 50%; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 50px var(--primary);
            animation: pulse-void 4s infinite ease-in-out;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #ritual-glow {
            width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            opacity: 0; transition: opacity 3s ease;
        }
        @keyframes pulse-void {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }
        .ceremony-content { width: 100%; max-width: 300px; }
        .btn-ritual {
            background: var(--primary); color: #000; border: none; padding: 12px 30px;
            border-radius: 30px; font-weight: 600; cursor: pointer; margin-top: 20px;
        }
        .ceremony-step input {
            background: transparent; border: none; border-bottom: 2px solid var(--border);
            color: white; font-size: 20px; text-align: center; width: 100%; outline: none; padding: 10px;
        }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 2s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <!-- Aura Sentiente (Atmósfera Dinámica) -->
    <div id="aura-system" class="aura-container">
        <div class="aura-blob aura-1"></div>
        <div class="aura-blob aura-2"></div>
        <div class="aura-blob aura-3"></div>
    </div>

    <!-- Toast de Actualización -->
    <div id="update-toast" class="update-toast hidden">
        <span>✨ Mejoras listas (v3.1.7)</span>
        <button id="btn-update-now">Actualizar</button>
    </div>
    <div id="app">
        <!-- Barra de Descarga en Segundo Plano -->
        <div id="ai-bg-downloader" class="ai-bg-downloader hidden">
            <div class="bg-progress-container">
                <div id="ai-bg-progress" class="bg-progress-bar"></div>
            </div>
            <span id="ai-bg-status">Sincronizando consciencia...</span>
        </div>

        <!-- Main Content (Portales de Vista) -->
        <main id="content">
            <div id="care-suggestion" class="care-card hidden"></div>
            <section id="view-inicio" class="view active"></section>
            <section id="view-ejercicio" class="view"></section>
            <section id="view-avisos" class="view"></section>
            <section id="view-diario" class="view"></section>
            <section id="view-mensajes" class="view"></section>
            <section id="view-zen" class="view view-zen-immersive"></section>
        </main>

        <!-- Modales Globales -->
        <div id="settings-modal" class="modal-overlay" style="display: none;"></div>

        <!-- Tab Bar -->
        <nav id="tab-bar">
            <button class="tab-item active" data-view="inicio">
                <i class="icon" data-lucide="layout-dashboard"></i>
                <span class="label">Inicio</span>
            </button>
            <button class="tab-item" data-view="ejercicio">
                <i class="icon" data-lucide="activity"></i>
                <span class="label">Salud</span>
            </button>
            <button class="tab-item" data-view="avisos">
                <i class="icon" data-lucide="bell"></i>
                <span class="label">Avisos</span>
            </button>
            <button class="tab-item" data-view="diario">
                <i class="icon" data-lucide="book-open"></i>
                <span class="label">Diario</span>
            </button>
            <button class="tab-item" data-view="mensajes">
                <i class="icon" data-lucide="message-square"></i>
                <span class="label">Conversar</span>
            </button>
        </nav>
    </div>

    <!-- UI Global: El Núcleo de Jade (Convergence) -->
    <div id="liquid-core" class="liquid-button">
        <i data-lucide="sparkles"></i>
    </div>

    <!-- UI Global: Portal de Comando -->
    <div id="command-portal" class="view overlay-portal">
        <div class="portal-header">
            <span class="portal-title">Comando Neuronal</span>
            <button id="btn-close-portal" class="icon-btn"><i data-lucide="x"></i></button>
        </div>
        <div id="portal-messages" class="portal-content">
            <div class="message ai">Jade estoy lista. ¿En qué puedo guiarte?</div>
        </div>
        <div class="portal-input-area">
            <input type="text" id="portal-input" placeholder="Comando rápido..." />
            <button id="btn-portal-send" class="icon-btn primary"><i data-lucide="send"></i></button>
        </div>
    </div>

    <!-- Scripts Maestros -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="mqa_audit.js?v=3.2.2"></script>
    <script type="module" src="app.js?v=3.2.2"></script>
</body>
</html>
